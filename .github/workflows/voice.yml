name: Mentor Jayvee AI Voice

on:
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Check webhook
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            echo "DISCORD_WEBHOOK is empty"
            exit 1
          fi
          echo "Webhook secret exists"

      - name: Send test message to Discord
        run: |
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d '{"content":"Test message from GitHub Actions ✅"}' \
            "${{ secrets.DISCORD_WEBHOOK }}")

          echo "HTTP_STATUS=$RESPONSE"
          echo "Response body:"
          cat response.txt
