name: Mentor Jayvee AI Voice

on:
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"]
          payload = {
              "content": "📢 **Mentor Jayvee AI Voice of the Day**\n\nProtect capital first. Hindi kailangan laging may trade.\nWait for confirmation candles before entering."
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              webhook,
              data=data,
              headers={"Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req) as resp:
              print("HTTP_STATUS=", resp.status)
          PY
